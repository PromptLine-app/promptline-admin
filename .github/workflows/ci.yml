name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    env:
      # Vite requires these to be present at build time even in CI.
      # These are placeholder values — the real keys live in Vercel's env vars.
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      VITE_SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # TypeScript type-check + Vite production build
      - run: npm run build
