name: Supabase Deploy

on:
  push:
    branches: [main, dev]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: sandbox
        type: choice
        options:
          - sandbox
          - production
      target:
        description: What to deploy
        required: true
        default: both
        type: choice
        options:
          - both
          - migrations
          - functions

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    environment: >-
      ${{
        github.event_name == 'workflow_dispatch' && inputs.environment ||
        (github.ref == 'refs/heads/main' && 'production' || 'sandbox')
      }}
    env:
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pinned (not "latest") so the action doesn't query the GitHub
          # releases API on every run — that lookup is rate-limited and was
          # failing the deploy with "Failed to resolve latest release".
          version: 2.106.0

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # Migrations are NOT run on push: run only via manual dispatch to avoid
      # accidentally pushing drifted migration history to the live DB.
      - name: Push migrations
        if: ${{ github.event.inputs.target == 'migrations' || github.event.inputs.target == 'both' }}
        run: supabase db push

      # Deploy only functions that have source on disk (skip _shared and any
      # config.toml stanzas whose source isn't in the repo).
      # --use-api avoids needing Docker on the runner.
      - name: Deploy edge functions
        if: ${{ github.event_name == 'push' || github.event.inputs.target == 'functions' || github.event.inputs.target == 'both' }}
        run: |
          mapfile -t fns < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name '_*' -printf '%f\n' 2>/dev/null | sort)
          if [ ${#fns[@]} -eq 0 ]; then
            echo "No edge functions found in supabase/functions/ — skipping."
            exit 0
          fi
          echo "Deploying ${#fns[@]} functions: ${fns[*]}"
          supabase functions deploy "${fns[@]}" --use-api --project-ref "$SUPABASE_PROJECT_ID"
